<!DOCTYPE html>
<html>

<head>
    <title>Route Example</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBHnlhVNYPeopOUmR4tHDB0DoXcRfMKduo"></script>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>

<body>

    <h3>Enter Source & Destination</h3>
    <input type="text" id="origin" placeholder="Enter source">
    <input type="text" id="destination" placeholder="Enter destination">
    <button onclick="calculateRoute()">Get Route</button>

    <div id="map"></div>

    <script>
        let map;
        let directionsService;
        let directionsRenderer;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 26.9124, lng: 75.7873 }, // Jaipur default
                zoom: 12
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map
            });
        }

        function calculateRoute() {
            const origin = document.getElementById("origin").value;
            const destination = document.getElementById("destination").value;
            directionsService.route({
                origin: origin,
                destination: destination,
                travelMode: google.maps.TravelMode.DRIVING,
                provideRouteAlternatives: true
            }, function (result, status) {

                if (status === "OK") {

                    console.log("Total routes:", result.routes.length);
                    const colors = ["#4285F4", "#34A853", "#EA4335"]; // Blue, Green, Red

                    result.routes.forEach((route, index) => {

                        const path = route.overview_path;

                        const polyline = new google.maps.Polyline({
                            path: path,
                            strokeOpacity: 0.7,
                            strokeWeight: 5,
                            strokeColor:  colors[index % colors.length],
                            map: map
                            
                        });

                    });

                }
            });

        }

        window.onload = initMap;
    </script>

</body>

</html>
